{% extends "admin_base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h2 class="mb-4">Admin Dashboard</h2>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card bg-primary text-white shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center justify-content-between">
                <div>
                    <h6 class="text-uppercase mb-1">Total Classifications</h6>
                    <h2 class="display-4 fw-bold mb-0">{{ total_logs }}</h2>
                </div>
                <i class="fas fa-microchip fa-4x opacity-25"></i>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="{{ url_for('admin_logs') }}" class="text-white text-decoration-none small">
                    View All Logs <i class="fas fa-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card bg-success text-white shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center justify-content-between">
                <div>
                    <h6 class="text-uppercase mb-1">Registered Users</h6>
                    <h2 class="display-4 fw-bold mb-0">{{ total_users }}</h2>
                </div>
                <i class="fas fa-users fa-4x opacity-25"></i>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="{{ url_for('admin_users') }}" class="text-white text-decoration-none small">
                    Manage Users <i class="fas fa-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Quick Actions</h5>
            </div>
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-md-3 mb-3">
                        <a href="{{ url_for('admin_logs') }}" class="btn btn-outline-primary w-100 py-3">
                            <i class="fas fa-list-alt fa-2x mb-2 d-block"></i>
                            Review Logs
                        </a>
                    </div>
                    <div class="col-md-3 mb-3">
                        <a href="{{ url_for('admin_users') }}" class="btn btn-outline-success w-100 py-3">
                            <i class="fas fa-user-plus fa-2x mb-2 d-block"></i>
                            Add User
                        </a>
                    </div>
                    <div class="col-md-3 mb-3">
                        <a href="{{ url_for('admin_export') }}" class="btn btn-outline-info w-100 py-3">
                            <i class="fas fa-file-export fa-2x mb-2 d-block"></i>
                            Export Data
                        </a>
                    </div>
                    <div class="col-md-3 mb-3">
                        <a href="{{ url_for('home') }}" class="btn btn-outline-secondary w-100 py-3">
                            <i class="fas fa-external-link-alt fa-2x mb-2 d-block"></i>
                            View Site
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
